# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/interviewiq_dev
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Flyway Configuration
# which helps us confirm if the path is wrong.
spring.flyway.check-location=true
spring.flyway.fail-on-missing-locations=true


spring.autoconfigure.exclude=
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none

# Hikari Autocommit Fix: HikariCP to NOT use autoCommit
spring.datasource.hikari.auto-commit=false

spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0
#spring.flyway.url=${spring.datasource.url}
#spring.flyway.user=${spring.datasource.username}
#spring.flyway.password=${spring.datasource.password}

##### JWT Configuration ######
# Secret key \u2014 used to sign and verify tokens (keep this secret!)
app.jwt.secret=1eb4450c77d3ffc675fa7831b298122b1764be9f9ceb56b5039bb830bf601a79
# Token expiry \u2014 24 hours in milliseconds (86400000 = 24 * 60 * 60 * 1000)
app.jwt.expiration=86400000


