# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/interviewiq_dev
spring.datasource.username=postgres
spring.datasource.password=Pranay@4546
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Flyway Configuration
# which helps us confirm if the path is wrong.
spring.flyway.check-location=true
spring.flyway.fail-on-missing-locations=true


spring.autoconfigure.exclude=
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none

# Hikari Autocommit Fix: HikariCP to NOT use autoCommit
spring.datasource.hikari.auto-commit=false

spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0
