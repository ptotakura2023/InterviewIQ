
#Base Config
spring.application.name=interviewiq
spring.profiles.active=dev

#JPA/Hibernate Config
spring.jpa.show-sql=true
#
spring.jpa.hibernate.ddl-auto=none

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# This ensures Flyway runs before Hibernate attempts to initialize
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Flyway Configuration
# This will make the app fail to start if it can't find the folder, 
# which helps us confirm if the path is wrong.
spring.flyway.check-location=true
spring.flyway.fail-on-missing-locations=true


spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Logging
logging.level.com.interviewiq=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

logging.level.org.flywaydb=DEBUG
logging.level.org.flywaydb.core=DEBUG
